basePath: /
definitions:
  app.AttendanceConfirmData:
    properties:
      invite_token:
        type: string
    type: object
  app.AttendanceGroupStatsData:
    properties:
      group_id:
        type: integer
      subject_id:
        type: integer
    type: object
  app.LoginData:
    properties:
      login:
        type: string
      password:
        type: string
      role:
        type: string
    type: object
  app.RegisterByInviteData:
    properties:
      invite_code:
        type: string
      login:
        type: string
      password:
        type: string
    type: object
  app.Response:
    properties:
      error:
        type: string
      id:
        type: string
      ok:
        type: boolean
      result: {}
    type: object
  httpserver.loginResponse:
    properties:
      error:
        example: ""
        type: string
      id:
        example: http-login
        type: string
      ok:
        example: true
        type: boolean
      result:
        $ref: '#/definitions/httpserver.loginResult'
    type: object
  httpserver.loginResult:
    properties:
      login:
        example: teacher_test
        type: string
      role:
        example: teacher
        type: string
      token:
        example: <jwt_token>
        type: string
      user_ID:
        example: "3"
        type: string
    type: object
  httpserver.profileResponse:
    properties:
      error:
        example: ""
        type: string
      id:
        example: http-profile
        type: string
      ok:
        example: true
        type: boolean
      result:
        $ref: '#/definitions/httpserver.profileResult'
    type: object
  httpserver.profileResult:
    properties:
      login:
        example: teacher_test
        type: string
      role:
        example: teacher
        type: string
      user_id:
        example: "3"
        type: string
    type: object
  httpserver.registerByInviteResponse:
    properties:
      error:
        example: ""
        type: string
      id:
        example: http-register-by-invite
        type: string
      ok:
        example: true
        type: boolean
      result:
        $ref: '#/definitions/httpserver.registerByInviteResult'
    type: object
  httpserver.registerByInviteResult:
    properties:
      group_id:
        example: 237
        type: integer
      login:
        example: student_iks_21
        type: string
      role:
        example: student
        type: string
      student_id:
        example: 56
        type: integer
      student_name:
        example: Демин Сергей А.
        type: string
      user_id:
        example: "12"
        type: string
    type: object
  httpserver.registerResponse:
    properties:
      error:
        example: ""
        type: string
      id:
        example: http-register
        type: string
      ok:
        example: true
        type: boolean
      result:
        $ref: '#/definitions/httpserver.registerResult'
    type: object
  httpserver.registerResult:
    properties:
      login:
        example: teacher1
        type: string
      role:
        example: teacher
        type: string
      user_id:
        example: "5"
        type: string
    type: object
  httpserver.studentAttendanceConfirmResponse:
    properties:
      error:
        example: ""
        type: string
      id:
        example: http-attendance-confirm
        type: string
      ok:
        example: true
        type: boolean
      result:
        $ref: '#/definitions/httpserver.studentAttendanceConfirmResult'
    type: object
  httpserver.studentAttendanceConfirmResult:
    properties:
      attendance:
        example: confirmed
        type: string
      lesson_id:
        example: "5"
        type: string
      marked_at:
        example: "2026-04-20T20:13:07+07:00"
        type: string
      student_id:
        example: "4"
        type: string
      subject_id:
        example: 2
        type: integer
      teacher_id:
        example: "3"
        type: string
    type: object
  httpserver.teacherAttendanceGroupResponse:
    properties:
      error:
        example: ""
        type: string
      id:
        example: http-teacher-attendance-group
        type: string
      ok:
        example: true
        type: boolean
      result:
        $ref: '#/definitions/httpserver.teacherAttendanceGroupResult'
    type: object
  httpserver.teacherAttendanceGroupResult:
    properties:
      group_id:
        example: 1
        type: integer
      students:
        items:
          $ref: '#/definitions/httpserver.teacherAttendanceGroupStudent'
        type: array
      subject_id:
        example: 2
        type: integer
      summary:
        $ref: '#/definitions/httpserver.teacherAttendanceGroupSummary'
      timezone:
        example: Asia/Novosibirsk
        type: string
    type: object
  httpserver.teacherAttendanceGroupStudent:
    properties:
      attendance_percent:
        example: 66.67
        type: number
      attended_sessions:
        example: 2
        type: integer
      last_marked_at:
        example: "2026-04-20T20:13:07+07:00"
        type: string
      student_id:
        example: 4
        type: integer
      student_name:
        example: Test Student
        type: string
      total_sessions:
        example: 3
        type: integer
    type: object
  httpserver.teacherAttendanceGroupSummary:
    properties:
      sessions_count:
        example: 3
        type: integer
      students_count:
        example: 1
        type: integer
    type: object
  httpserver.teacherAttendanceLinkRequest:
    properties:
      expires_minutes:
        example: 20
        type: integer
      group_ids:
        example:
        - 1
        items:
          type: integer
        type: array
      lesson_name:
        example: Networks
        type: string
      subject_id:
        example: 2
        type: integer
    type: object
  httpserver.teacherAttendanceLinkResponse:
    properties:
      error:
        example: ""
        type: string
      id:
        example: http-attendance-link
        type: string
      ok:
        example: true
        type: boolean
      result:
        $ref: '#/definitions/httpserver.teacherAttendanceLinkResult'
    type: object
  httpserver.teacherAttendanceLinkResult:
    properties:
      expires_at:
        example: "2026-04-21T21:25:37+07:00"
        type: string
      expires_minutes:
        example: 20
        type: integer
      group_ids:
        items:
          type: integer
        type: array
      invite_token:
        example: <attendance_invite_jwt>
        type: string
      join_url:
        example: http://localhost:3000/attendance/join?token=<attendance_invite_jwt>
        type: string
      lesson_id:
        example: "5"
        type: string
      lesson_name:
        example: Networks
        type: string
      qr_payload:
        example: http://localhost:3000/attendance/join?token=<attendance_invite_jwt>
        type: string
      roster_size:
        example: 25
        type: integer
      schedule_end:
        example: "2026-04-21T22:25:24+07:00"
        type: string
      schedule_start:
        example: "2026-04-21T21:15:24+07:00"
        type: string
      subject_id:
        example: 2
        type: integer
      teacher_id:
        example: "3"
        type: string
      timezone:
        example: Asia/Novosibirsk
        type: string
      url:
        example: http://localhost:3000/attendance/join?token=<attendance_invite_jwt>
        type: string
    type: object
info:
  contact: {}
  description: Backend API for e-journal, attendance links and invite registration.
  title: EJournal Backend API
  version: "1.0"
paths:
  /api/student/attendance/confirm:
    post:
      consumes:
      - application/json
      description: Student confirms attendance for active session.
      parameters:
      - description: Attendance confirm payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app.AttendanceConfirmData'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.studentAttendanceConfirmResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/app.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/app.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/app.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      security:
      - BearerAuth: []
      summary: Confirm attendance by invite token
      tags:
      - attendance
  /api/teacher/attendance-link:
    post:
      consumes:
      - application/json
      description: Teacher creates attendance session and gets invite/join URL. If
        subject_id/group_ids are omitted, they are taken from nearest scheduled lesson.
      parameters:
      - description: Attendance session payload (subject_id/group_ids are optional)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpserver.teacherAttendanceLinkRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.teacherAttendanceLinkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/app.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/app.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      security:
      - BearerAuth: []
      summary: Create attendance session link
      tags:
      - attendance
  /api/teacher/attendance/group:
    post:
      consumes:
      - application/json
      description: Returns per-student attendance stats for selected group and optional
        subject.
      parameters:
      - description: Group stats payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app.AttendanceGroupStatsData'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.teacherAttendanceGroupResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/app.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/app.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      security:
      - BearerAuth: []
      summary: Get attendance stats by group
      tags:
      - attendance
  /api/teacher/attendance/session:
    post:
      consumes:
      - application/json
      description: Teacher creates attendance session and gets invite/join URL. If
        subject_id/group_ids are omitted, they are taken from nearest scheduled lesson.
      parameters:
      - description: Attendance session payload (subject_id/group_ids are optional)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/httpserver.teacherAttendanceLinkRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.teacherAttendanceLinkResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/app.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/app.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      security:
      - BearerAuth: []
      summary: Create attendance session link
      tags:
      - attendance
  /login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns JWT token.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app.LoginData'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.loginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      summary: Login user
      tags:
      - auth
  /profile:
    get:
      description: Returns current user profile from Authorization token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.profileResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - auth
  /register:
    post:
      consumes:
      - application/json
      description: Registers a user by login/password and role.
      parameters:
      - description: Register payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app.LoginData'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.registerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      summary: Register user
      tags:
      - auth
  /register/by-invite:
    post:
      consumes:
      - application/json
      description: Creates student account by one-time invite code from database.
      parameters:
      - description: Register by invite payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app.RegisterByInviteData'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpserver.registerByInviteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/app.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/app.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app.Response'
      summary: Register student by invite code
      tags:
      - auth
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
