services:
  postgres:
    image: postgres:16-alpine
    container_name: ejournal-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ejournal}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ejournal}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    image: golang:1.26.1-alpine
    container_name: ejournal-migrate
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DB_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ejournal}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -lc "/usr/local/go/bin/go install github.com/pressly/goose/v3/cmd/goose@latest &&
      /go/bin/goose -dir migrations postgres \"$$DB_DSN\" up"
    restart: "no"

  ejournal-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ejournal-backend
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      SITE_BASE_URL: ${SITE_BASE_URL:-http://localhost:9999}
      APP_PORT: ${APP_PORT:-8888}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:9999,http://127.0.0.1:9999,http://localhost:3000,http://127.0.0.1:3000}
      DB_DSN: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ejournal}?sslmode=disable
      ROLE_HASH_TEACHER: ${ROLE_HASH_TEACHER:-TEACHER-HASH-2026}
      ROLE_HASH_STUDENT: ${ROLE_HASH_STUDENT:-STUDENT-HASH-2026}
      DEFAULT_STUDENT_GROUP_ID: ${DEFAULT_STUDENT_GROUP_ID:-1}
      ALLOW_EARLY_ATTENDANCE: ${ALLOW_EARLY_ATTENDANCE:-true}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-8888}:${APP_PORT:-8888}"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sibsutis_front
    depends_on:
      - ejournal-backend
    ports:
      - "${FRONTEND_PORT:-9999}:80"
    restart: unless-stopped

volumes:
  pgdata:
